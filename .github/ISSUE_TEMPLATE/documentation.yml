name: 📚 Documentation
description: Suggest improvements to documentation
title: "[DOCS]: "
labels: ["documentation", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation! 📖

  - type: checkboxes
    id: terms
    attributes:
      label: Prerequisites
      description: By submitting this issue, you confirm that
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: dropdown
    id: doc-type
    attributes:
      label: What type of documentation issue is this? 📝
      description: Select the category that best fits
      options:
        - README improvement
        - Code comments
        - API documentation
        - Setup/installation guide
        - Tutorial/guide
        - Code examples
        - FAQ
        - Contributing guidelines
        - Other
    validations:
      required: true

  - type: textarea
    id: current-issue
    attributes:
      label: What's wrong with the current documentation? 🤔
      description: Describe what's missing, unclear, or incorrect
      placeholder: The current documentation is confusing because...
    validations:
      required: true

  - type: textarea
    id: suggested-improvement
    attributes:
      label: How can we improve it? ✨
      description: Describe what changes would help
      placeholder: It would be clearer if we added...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context 📋
      description: Add any other context about the documentation issue
      placeholder: Any additional information...

  - type: checkboxes
    id: contribute
    attributes:
      label: Would you like to work on this? 🙋‍♀️
      options:
        - label: I'd like to work on improving this documentation