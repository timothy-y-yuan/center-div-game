name: 🐛 Bug Report
description: File a bug report to help us improve
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 🎯

  - type: checkboxes
    id: terms
    attributes:
      label: Prerequisites
      description: By submitting this issue, you confirm that
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have reproduced this bug in the latest version
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened? 🤔
      description: Describe what you expected to happen and what actually happened
      placeholder: Tell us what went wrong!
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce 🔄
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior ✅
      description: What should have happened?
      placeholder: Describe the expected behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots 📷
      description: If applicable, add screenshots to help explain your problem
      placeholder: Drag and drop images here or click to upload

  - type: dropdown
    id: browsers
    attributes:
      label: Browser 🌐
      description: What browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser Version
      description: What version of the browser?
      placeholder: e.g., 120.0.0.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System 💻
      description: What operating system are you using?
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context 📋
      description: Add any other context about the problem here
      placeholder: Any additional information that might help us solve this issue

  - type: checkboxes
    id: contribute
    attributes:
      label: Would you like to work on this? 🙋‍♀️
      options:
        - label: I'd like to work on fixing this bug