name: 🐛 Bug Report
description: Report a bug or issue with the Center Div Game
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
  
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true
      
  - type: dropdown
    id: browsers
    attributes:
      label: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
        - Other
    validations:
      required: true
      
  - type: dropdown
    id: level
    attributes:
      label: Which game level(s) are affected?
      multiple: true
      options:
        - "Level 1: Baby's First Center"
        - "Level 2: Add Vertical Too"
        - "Level 3: Grid Power"
        - "Level 4: Absolute Beginner"
        - "Level 5: Text-Align Hack"
        - "Level 6: Table Cell Vibes"
        - "Level 7: CSS Calc() Wizard"
        - "Level 8: Margin Auto Magic"
        - "Level 9: Multiple Targets"
        - "Level 10: CSS Ninja Final Boss"
        - "All levels"
        - "Not level-specific"
        
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
      
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
      
  - type: textarea
    id: console-logs
    attributes:
      label: Console Logs
      description: If applicable, include any error messages from the browser console.
      render: shell
      
  - type: dropdown
    id: device
    attributes:
      label: Device Type
      options:
        - Desktop
        - Tablet
        - Mobile
        
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.